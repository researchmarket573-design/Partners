<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HYZR Partner App Download</title>

<link rel="icon" type="image/png" href="https://firebasestorage.googleapis.com/v0/b/my-dream-project-30a0d.firebasestorage.app/o/HYZR%20(2).png?alt=media&token=41d7d4f0-70a0-4344-a69a-cadcdc7f28c9">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --brand-green: #0B4D3B;
}

* {
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  margin:0;
  min-height:100vh;
  background:var(--brand-green);
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  color:#ffffff;
}

.container{
  max-width:420px;
  padding:20px;
}

.logo{
  width:220px;
  margin-bottom:10px;
}

h1{
  font-size:24px;
  margin-bottom:6px;
}

.subtext{
  font-size:14px;
  color:rgba(255,255,255,0.85);
  margin-bottom:28px;
}

.btn{
  display:inline-flex;
  justify-content:center;
  align-items:center;
  height:56px;
  padding:0 24px;
  border-radius:14px;
  text-decoration:none;
  font-size:15px;
  font-weight:500;
  color:#0B4D3B;
  background:#ffffff;
  box-shadow:0 8px 18px rgba(0,0,0,0.25);
}

.footer{
  margin-top:25px;
  font-size:12px;
  color:rgba(255,255,255,0.7);
}
</style>

</head>

<body>

<div class="container">

<img class="logo"
src="https://firebasestorage.googleapis.com/v0/b/my-dream-project-30a0d.firebasestorage.app/o/Untitled%20design%20(1).png?alt=media&token=107959f1-6a57-48a9-8ca3-dd53d33ce7b5">

<h1>Install HYZR Partner App</h1>

<div class="subtext">Connecting Drivers & Partners to Smart Mobility</div>

<a id="fallbackBtn" class="btn" href="#">
Download App
</a>

<div class="footer">HYZR | Beyond Mobility</div>

</div>

<script>

const androidLink="https://play.google.com/store/apps/details?id=com.hyzr.hyzr.companion.app";
const iosLink="https://apps.apple.com/in/app/hyzr-team/id6740608764";

function detectDevice(){

const ua=navigator.userAgent || navigator.vendor || window.opera;

if(/android/i.test(ua)){
window.location.href=androidLink;
document.getElementById("fallbackBtn").href=androidLink;
}

else if(/iPad|iPhone|iPod/.test(ua) && !window.MSStream){
window.location.href=iosLink;
document.getElementById("fallbackBtn").href=iosLink;
}

else{
window.location.href=androidLink;
document.getElementById("fallbackBtn").href=androidLink;
}

}

detectDevice();

</script>

</body>
</html>
